<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pix - MXP$15</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background-color: #0b0e14; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .box-qr { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; max-width: 400px; margin: 40px auto; }
        .btn-confirmar { background: #007bff; color: #fff; border: none; padding: 15px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="box-qr">
        <h2>Pagamento via Pix</h2>
        <p>Valor do depósito:</p>
        <h1 id="textoValor" style="color: #28a745;">R$ 0,00</h1>
        
        <!-- Simulação de QR Code (Pode colocar uma imagem de QR Code real aqui) -->
        <div style="background: #fff; padding: 15px; display: inline-block; border-radius: 8px; margin: 15px 0;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=ExemploDeChavePix" alt="QR Code Pix">
        </div>
        
        <p style="font-size: 12px; color: #8b949e;">Escaneie o QR Code com o aplicativo do seu banco ou copie a chave Pix.</p>

        <!-- Botão para simular que o pagamento foi aprovado -->
        <button class="btn-confirmar" onclick="confirmarPagamentoSucesso()">Já fiz o pagamento / Simular Aprovação</button>
        <br><br>
        <button onclick="history.back()" style="background:transparent; border:none; color:#8b949e; cursor:pointer;">Voltar</button>
    </div>

    <script>
        // Pega o valor que veio da página de depósito pela URL (ex: qrcode.html?valor=50)
        const urlParams = new URLSearchParams(window.location.search);
        const valorDepositado = parseFloat(urlParams.get('valor')) || 0;

        // Exibe o valor na tela
        document.getElementById('textoValor').innerText = `R$ ${valorDepositado.toFixed(2).replace('.', ',')}`;

        // Função que é acionada quando o pagamento é confirmado (ou simulado)
        function confirmarPagamentoSucesso() {
            if (valorDepositado <= 0) {
                alert("Valor inválido.");
                window.location.href = "deposito.html";
                return;
            }

            // 1. Pega o saldo atual salvo no navegador (ou 0 se não tiver nada)
            let saldoAtual = parseFloat(localStorage.getItem('mxp_saldo')) || 0;

            // 2. Soma o depósito ao saldo existente
            let novoSaldo = saldoAtual + valorDepositado;

            // 3. Salva atualizado no localStorage
            localStorage.setItem('mxp_saldo', novoSaldo.toFixed(2));

            alert("Depósito de R$ " + valorDepositado.toFixed(2) + " aprovado com sucesso!");

            // 4. Redireciona para a Home (onde o saldo vai aparecer automaticamente no topo!)
            window.location.href = "home.html";
        }
    </script>
</body>
</html>
