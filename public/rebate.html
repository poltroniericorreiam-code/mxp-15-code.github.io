<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoção - Rebate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-gold: #d4af37; --btn-green: #00c853; --btn-grey: #262d3a; --text-main: #ffffff; --text-muted: #8b949e; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; padding-bottom: 90px; height: 100vh; display: flex; flex-direction: column; }

        .tabs { display: flex; overflow-x: auto; background: #1c2431; padding: 10px; border-bottom: 1px solid #30363d; }
        .tab { padding: 10px 15px; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
        .tab.active { color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); }

        .rebate-header { padding: 15px 20px; font-size: 1em; }
        .rebate-total { color: var(--accent-gold); font-weight: bold; }

        .content-area { display: flex; flex: 1; padding: 10px; gap: 10px; overflow: hidden; }
        .sidebar { width: 80px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar-item { padding: 15px 5px; text-align: center; background: #161b22; border-radius: 8px; color: var(--text-muted); font-size: 0.75em; cursor: pointer; }
        .sidebar-item.active { background: #1c2431; color: var(--accent-gold); border: 1px solid var(--accent-gold); }

        /* Botões de Ação Dinâmicos */
        .btn-action { padding: 12px 5px; text-align: center; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.8em; transition: 0.3s; }
        .btn-receber { background: var(--btn-grey); color: #888; cursor: not-allowed; }
        .btn-receber.ativo { background: var(--btn-green); color: #000; cursor: pointer; }
        .btn-historico { background: var(--accent-gold); color: #000; }

        .display-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .game-card { background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d; }
        .game-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9em; }
        .progress-container { height: 6px; background: #0b0e14; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        .progress-bar { height: 100%; background: var(--accent-gold); width: 30%; }

        .navbar { position: fixed; bottom: 0; width: 100%; background: #0b0e14; border-top: 1px solid #30363d; display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 0.75em; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--accent-gold); }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab">Eventos</div>
        <div class="tab active">Rebate</div>
        <div class="tab">VIP</div>
        <div class="tab">Código de Resgate</div>
    </div>

    <div class="rebate-header">Pode ser coletado hoje: <span class="rebate-total" id="saldo-rebate">R$ 00,00</span></div>

    <div class="content-area">
        <div class="sidebar">
            <div class="sidebar-item active"><i class="fa-solid fa-gamepad"></i><br>Slot</div>
            <div class="sidebar-item"><i class="fa-solid fa-fish"></i><br>Pesca</div>
            <div class="sidebar-item"><i class="fa-solid fa-futbol"></i><br>Esportes</div>
            
            <div id="btn-receber" class="btn-action btn-receber" onclick="coletarRebate()">Receber</div>
            <div class="btn-action btn-historico">Histórico</div>
        </div>
        
        <div class="display-scroll">
            <div class="game-card">
                <div class="game-info"><span>PG Aposta</span><span class="valor-aposta">500,00</span></div>
                <div class="game-info" style="color: var(--text-muted); font-size: 0.8em;">Taxa: 0,50%</div>
                <div class="progress-container"><div class="progress-bar"></div></div>
            </div>
            <div class="game-card">
                <div class="game-info"><span>JDB Aposta</span><span class="valor-aposta">300,00</span></div>
                <div class="game-info" style="color: var(--text-muted); font-size: 0.8em;">Taxa: 0,20%</div>
                <div class="progress-container"><div class="progress-bar"></div></div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-item" onclick="location.href='index.html'"><i class="fa-solid fa-house" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Inicio</div>
        <div class="nav-item active" onclick="location.href='promocao.html'"><i class="fa-solid fa-gift" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Promoção</div>
        <div class="nav-item" onclick="location.href='deposito.html'"><i class="fa-solid fa-wallet" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Depósito</div>
        <div class="nav-item" onclick="location.href='saque.html'"><i class="fa-solid fa-arrow-right-arrow-left" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Saque</div>
        <div class="nav-item" onclick="location.href='perfil.html'"><i class="fa-solid fa-user" style="display:block; font-size: 1.4em; margin-bottom: 4px;"></i>Perfil</div>
    </nav>

    <script>
        function coletarRebate() {
            const btn = document.getElementById('btn-receber');
            const saldoEl = document.getElementById('saldo-rebate');
            
            if (btn.classList.contains('ativo')) {
                alert("Rebate coletado com sucesso!");
                
                // Zera o saldo
                saldoEl.textContent = "R$ 0,00";
                
                // Zera todos os campos de aposta
                document.querySelectorAll('.valor-aposta').forEach(el => el.textContent = "0,00");
                
                // Desativa o botão
                btn.classList.remove('ativo');
            }
        }

        // Verifica estado inicial ao carregar
        window.onload = function() {
            const btn = document.getElementById('btn-receber');
            const saldoEl = document.getElementById('saldo-rebate');
            let saldo = parseFloat(saldoEl.textContent.replace('R$ ', '').replace(',', '.'));
            
            if (saldo > 0) {
                btn.classList.add('ativo');
            }
        };
    </script>
</body>
</html>
