<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saque - Casino Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-blue: #007bff; --text-main: #ffffff; --text-muted: #8b949e; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 0 20px; padding-bottom: 30px; }

        .header { padding: 20px 0; display: flex; align-items: center; font-weight: bold; font-size: 1.2em; }
        
        /* Box de Saldo (Condicional) */
        #aviso-rollover { background: #1c2431; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; display: none; }
        
        .grid-values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .value-btn { padding: 15px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; text-align: center; cursor: pointer; color: #fff; }
        .value-btn.selected { border: 1px solid var(--accent-blue); background: #1c2431; color: var(--accent-blue); }

        .input-manual { width: 100%; padding: 15px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 20px; outline: none; }
        
        .methods { display: flex; gap: 10px; margin-bottom: 20px; }
        .method-btn { flex: 1; padding: 12px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; text-align: center; cursor: pointer; color: #8b949e; }
        .method-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: #1c2431; }

        .input-field { width: 100%; padding: 15px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: white; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        
        .btn-withdraw { width: 100%; padding: 18px; background: var(--accent-blue); border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 1em; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-chevron-left" style="cursor:pointer;" onclick="history.back()"></i> 
        <span style="margin: 0 auto;">Saque</span>
    </div>

    <div id="aviso-rollover">
        <div>Conta Saldo <span id="saldo-atual" style="color: #d4af37;">R$ 0,00</span></div>
        <div style="font-size: 0.8em; color: var(--text-muted); margin-top: 5px;">
            Você precisa apostar <span id="valor-pendente">R$ 0,00</span> para sacar 
            <a href="#" style="color: var(--accent-blue);">Ver detalhes</a>
        </div>
    </div>

    <div class="grid-values">
        <div class="value-btn" onclick="selecionarValor(10)">10,00</div>
        <div class="value-btn" onclick="selecionarValor(50)">50,00</div>
        <div class="value-btn" onclick="selecionarValor(100)">100,00</div>
        <div class="value-btn" onclick="selecionarValor(500)">500,00</div>
        <div class="value-btn" onclick="selecionarValor(1000)">1.000,00</div>
        <div class="value-btn" onclick="selecionarValor(2000)">2.000,00</div>
        <div class="value-btn" onclick="selecionarValor(5000)">5.000,00</div>
        <div class="value-btn" onclick="selecionarValor(10000)">10.000,00</div>
        <div class="value-btn" onclick="selecionarValor(15000)">15.000,00</div>
    </div>

    <input type="number" id="valor-saque" class="input-manual" placeholder="10,00 - 15.000,00">

    <div class="methods">
        <div class="method-btn active">CPF</div>
        <div class="method-btn">PHONE</div>
        <div class="method-btn">EMAIL</div>
    </div>

    <input type="text" class="input-field" placeholder="Nome">
    <input type="text" class="input-field" placeholder="CPF ID">

    <button class="btn-withdraw" onclick="realizarSaque()">Retirar Agora</button>

    <script>
        // Dados do Usuário (Altere 'aposta_pendente' para 0 para ver o aviso sumir)
        const usuario = { saldo: 500.00, aposta_pendente: 0.16 };

        window.onload = function() {
            const divAviso = document.getElementById('aviso-rollover');
            if (usuario.aposta_pendente > 0) {
                divAviso.style.display = 'block';
                document.getElementById('saldo-atual').innerText = 'R$ ' + usuario.saldo.toFixed(2);
                document.getElementById('valor-pendente').innerText = 'R$ ' + usuario.aposta_pendente.toFixed(2);
            }
        };

        function selecionarValor(valor) {
            document.getElementById('valor-saque').value = valor;
            document.querySelectorAll('.value-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function realizarSaque() {
            let valor = parseFloat(document.getElementById('valor-saque').value);
            
            // Lógica de bloqueio por rollover
            if (usuario.aposta_pendente > 0) {
                alert("Bloqueado: Você ainda precisa completar o requisito de aposta.");
            } else if (isNaN(valor) || valor < 10 || valor > 15000) {
                alert("O valor de saque deve estar entre R$ 10,00 e R$ 15.000,00.");
            } else {
                alert("Solicitação de saque de R$ " + valor.toFixed(2) + " enviada!");
            }
        }
    </script>
</body>
</html>
