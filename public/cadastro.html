<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MXP$15</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-box">
    <img src="4085.jpg" width="150" alt="Logo">
    <h1>CRIAR CONTA</h1>
    <form id="formCadastro">
        <input type="text" id="usuario" placeholder="Usuário" required>
        <br><br>
        <input type="email" id="email" placeholder="E-mail" required>
        <br><br>
        <input type="password" id="senha" placeholder="Senha" minlength="6" required>
        <br><br>
        <button type="submit">CADASTRAR</button>
    </form>
    <br><br>
    <button type="button" onclick="window.location.href='login.html'">VOLTAR LOGIN</button>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
    document.getElementById("formCadastro").addEventListener("submit", async function(e){
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;

        try {
            // Apenas o cadastro de autenticação
            const { data, error } = await window.supabaseClient.auth.signUp({
                email: email,
                password: senha
            });

            if (error) throw error;

            alert("Cadastro realizado! Você já pode fazer login.");
            window.location.href = "login.html";

        } catch(err) {
            alert("Erro: " + err.message);
        }
    });
</script>

</body>
</html>
