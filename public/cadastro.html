<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MXP$15</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-box">
    <img src="4085.jpg" width="150" alt="Logo">
    <h1>CRIAR CONTA</h1>
    <form id="formCadastro">
        <input type="text" id="usuario" placeholder="Usuário" required>
        <br><br>
        <input type="email" id="email" placeholder="E-mail" required>
        <br><br>
        <input type="password" id="senha" placeholder="Senha" minlength="6" required>
        <br><br>
        <button type="submit">CADASTRAR</button>
    </form>
    <br><br>
    <button type="button" onclick="window.location.href='login.html'">VOLTAR LOGIN</button>
</div>

<!-- Biblioteca do Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // Inicialização configurada com seu ID de projeto e sua chave
    const supabaseUrl = 'https://guavczqfnqkshhgpyccs.supabase.co';
    const supabaseKey = 'sb_publishable_1qUbWglTgDfCV4MIDT7qWQ_jetIG_ht';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById("formCadastro").addEventListener("submit", async function(e){
        e.preventDefault();

        const nome = document.getElementById("usuario").value.trim();
        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;

        try {
            // 1. Cria o usuário no sistema de autenticação
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: senha
            });

            if (error) throw error;

            // 2. Grava o nome na tabela 'usuarios'
            const { error: erroUsuario } = await supabase
                .from("usuarios")
                .insert([{ 
                    id: data.user.id, 
                    nome: nome, 
                    email: email 
                }]);

            if (erroUsuario) throw erroUsuario;

            alert("Sucesso! Cadastro realizado.");
            window.location.href = "login.html";

        } catch(err) {
            alert("Erro: " + err.message);
        }
    });
</script>

</body>
</html>
