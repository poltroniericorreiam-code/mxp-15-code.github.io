<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MXP$15</title>

    <link rel="stylesheet" href="estilos.css">

    <!-- 1. Carrega a biblioteca -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2. Carrega seu arquivo de conexão -->
    <script src="supabase.js"></script>
</head>

<body>

    <div class="login-box">
        <img src="4085.jpg" width="150" alt="Logo">
        <h1>CRIAR CONTA</h1>

        <form id="formCadastro">
            <input type="text" id="usuario" placeholder="Usuário" required>
            <br><br>
            <input type="email" id="email" placeholder="E-mail" required>
            <br><br>
            <input type="password" id="senha" placeholder="Senha" minlength="6" required>
            <br><br>
            <button type="submit" id="btnCadastrar">CADASTRAR</button>
        </form>

        <br><br>
        <button type="button" onclick="window.location.href='login.html'">VOLTAR LOGIN</button>
    </div>

    <script>
    document.getElementById("formCadastro").addEventListener("submit", async function(e){
        e.preventDefault();

        // Verifica se o Supabase carregou
        if (typeof supabase === 'undefined') {
            alert("Erro: O Supabase não foi inicializado. Verifique o arquivo supabase.js");
            return;
        }

        const usuario = document.getElementById("usuario").value.trim();
        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;

        try {
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: senha
            });

            if(error) throw error;

            if(data.user){
                const { error: erroUsuario } = await supabase
                .from("usuarios")
                .insert({
                    id: data.user.id,
                    usuario: usuario,
                    email: email
                });

                if(erroUsuario) throw erroUsuario;

                alert("Cadastro realizado com sucesso!");
                window.location.href = "login.html";
            }
        } catch(err){
            alert("Erro: " + err.message);
            console.error(err);
        }
    });
    </script>
</body>
</html>
