<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <!-- CORRIGIDO: Agora aponta para o seu arquivo real da pasta -->
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <div class="login-box">

        <!-- Foto de capa/logo carregando corretamente da raiz -->
        <img src="4085.jpg" width="150" alt="Logo">

        <h1>CRIAR CONTA</h1>

        <br>

        <form id="formCadastro">

            <!-- CORRIGIDO: required impede o envio do campo vazio -->
            <input type="text" id="usuario" placeholder="Usuário" required>

            <br><br>

            <!-- CORRIGIDO: required e minlength exigem uma senha válida -->
            <input type="password" id="senha" placeholder="Senha" minlength="4" required>

            <br><br>

            <button type="submit">
                CADASTRAR
            </button>

        </form>

        <br><br>

        <button onclick="window.location.href='login.html'">
            VOLTAR LOGIN
        </button>

    </div>

    <script>
    document.getElementById("formCadastro").addEventListener("submit", function(e){
        e.preventDefault();

        let usuario = document.getElementById("usuario").value.trim();
        let senha = document.getElementById("senha").value;

        // Validação extra de segurança para garantir que não enviaram apenas espaços em branco
        if (usuario === "" || senha === "") {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        // Salva os dados no navegador para o sistema de login funcionar
        localStorage.setItem("usuario", usuario);
        localStorage.setItem("senha", senha);

        alert("Cadastro realizado com sucesso!");

        // Redireciona o usuário para a tela de login
        window.location.href = "login.html";
    });
    </script>

</body>
</html>
