<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MXP$15</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-box">
    <img src="4085.jpg" width="150" alt="Logo">
    <h1>LOGIN</h1>
    <form id="formLogin">
        <input type="email" id="email" placeholder="E-mail" required>
        <br><br>
        <input type="password" id="senha" placeholder="Senha" required>
        <br><br>
        <button type="submit">ENTRAR</button>
    </form>
    <br><br>
    <button type="button" onclick="window.location.href='cadastro.html'">CRIAR CONTA</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseUrl = 'https://guavczqfnqkshhgpyccs.supabase.co';
    const supabaseKey = 'sb_publishable_1qUbWglTgDfCV4MIDT7qWQ_jetIG_ht';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById("formLogin").addEventListener("submit", async function(e){
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value;

        try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });
            if (error) throw error;
            
            alert("Login realizado com sucesso!");
            window.location.href = "index.html"; // Redireciona para a home
        } catch(err) {
            alert("Erro no Login: " + err.message);
        }
    });
</script>
</body>
</html>
