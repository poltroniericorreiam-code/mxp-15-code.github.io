<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MXP$15</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-box">
    <img src="4085.jpg" width="150" alt="Logo">
    <h1>ENTRAR</h1>
    
    <form id="formLogin">
        <input type="email" id="email" placeholder="E-mail" required>
        <br><br>
        <input type="password" id="senha" placeholder="Senha" required>
        <br><br>
        <button type="submit">ENTRAR</button>
    </form>
    <br><br>
    <button type="button" onclick="window.location.href='cadastro.html'">CRIAR CONTA</button>
</div>

<!-- Biblioteca do Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabaseUrl = 'https://guavczqfnqkshhgpyccs.supabase.co';
    const supabaseKey = 'sb_publishable_1qUbWglTgDfCV4MIDT7qWQ_jetIG_ht';
    
    // Verifica se o Supabase carregou
    if (typeof supabase === 'undefined') {
        alert("Erro: A biblioteca do Supabase não carregou. Verifique sua internet.");
    } else {
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById("formLogin").addEventListener("submit", async function(e){
            e.preventDefault();
            
            const email = document.getElementById("email").value.trim();
            const senha = document.getElementById("senha").value;

            try {
                const { data, error } = await client.auth.signInWithPassword({ 
                    email: email, 
                    password: senha 
                });

                if (error) throw error;

                // ATUALIZAÇÃO AQUI: Salva a marcação para a home.html liberar o acesso
                localStorage.setItem("usuarioLogado", "true");

                // Se chegou aqui, o login deu certo
                alert("Login realizado com sucesso!");
                window.location.href = "home.html";
                
            } catch(err) {
                alert("Erro ao entrar: " + err.message);
            }
        });
    }
</script>

</body>
</html>
