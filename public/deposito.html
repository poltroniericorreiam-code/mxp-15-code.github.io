<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-blue: #007bff; --text-main: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 0 20px; }

        .header { padding: 20px 0; display: flex; align-items: center; font-weight: bold; font-size: 1.2em; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .tab { color: #8b949e; cursor: pointer; }
        .tab.active { color: var(--accent-blue); border-bottom: 2px solid var(--accent-blue); }

        .pix-options { display: flex; gap: 10px; margin-bottom: 20px; }
        .pix-btn { flex: 1; padding: 15px; background: #1c2431; border: 1px solid #30363d; border-radius: 8px; text-align: center; cursor: pointer; }
        .pix-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); }

        .promo-box { background: #1c2431; padding: 15px; border-radius: 8px; font-size: 0.85em; margin-bottom: 20px; color: #ccc; }
        
        .input-group { background: #161b22; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; color: #8b949e; }

        .grid-values { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .value-btn { padding: 15px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; text-align: center; cursor: pointer; }
        
        .btn-deposit { width: 100%; padding: 18px; background: var(--accent-blue); border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 1em; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-chevron-left" onclick="history.back()"></i> 
        <span style="margin: 0 auto;">Depósito</span>
    </div>

    <div class="tab-bar">
        <div class="tab active">Depósito on-line</div>
    </div>

    <div class="pix-options">
        <div class="pix-btn active">PIX</div>
        <div class="pix-btn">PIX</div>
        <div class="pix-btn">PIX</div>
    </div>

    <div class="promo-box">
        💰 CONVIDE 1 PESSOA E GANHE R$ 30! Após o depósito ser bem-sucedido, lembre-se de reivindicar o evento "Bônus de depósito diário de R$ 2777"!🎁
    </div>

    <div class="input-group">R$ 5 - 50.000</div>

    <div class="grid-values">
        <div class="value-btn">15,00</div>
        <div class="value-btn">35,00</div>
        <div class="value-btn">60,00</div>
        <div class="value-btn">130,00</div>
        <div class="value-btn">200,00</div>
        <div class="value-btn">500,00</div>
        <div class="value-btn">1.000,00</div>
        <div class="value-btn">5.000,00</div>
        <div class="value-btn">15.000,00</div>
    </div>

    <button class="btn-deposit">Depositar Agora</button>

</body>
</html>
