<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito</title>

    <!-- CORRIGIDO: Vinculado ao seu arquivo real estilos.css -->
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <div class="login-box">

        <img src="4085.jpg" width="120" alt="Logo">

        <h1>DEPÓSITO PIX</h1>

        <br>

        <div class="vip-box">
            <h2>Bônus de 100%</h2>
            <p>Deposite R$20 e receba 23</p>
        </div>

        <br>

        <!-- CORRIGIDO: Adicionado ID para capturar o valor corretamente -->
        <input type="number" id="valor-deposito" placeholder="Digite o valor">

        <br><br>

        <!-- CORRIGIDO: Adicionado ID para o evento de clique -->
        <button id="btn-gerar">
            GERAR PIX
        </button>

        <br><br>

        <p>Chave PIX:</p>
        <h3>mxp15@pix.com</h3>

        <br>

        <!-- CORRIGIDO: Redireciona para o seu arquivo real página inicial.html -->
        <button onclick="window.location.href='página inicial.html'">
            Voltar
        </button>

    </div>

    <script>
    document.getElementById('btn-gerar').addEventListener('click', async (e) => {
        e.preventDefault();
        
        const valorInput = document.getElementById('valor-deposito');
        const valor = valorInput && valorInput.value ? parseFloat(valorInput.value) : 20;

        if (valor <= 0 || isNaN(valor)) {
            alert('Por favor, insira um valor válido para o depósito.');
            return;
        }

        alert('Gerando seu PIX... Por favor, aguarde alguns segundos.');

        try {
            // Conecta diretamente com a sua rota da API que contém o gerar-pix.js
            const response = await fetch('/api/gerar-pix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ valor: valor })
            });

            const dados = await response.json();

            if (dados.sucesso) {
                const novaJanela = window.open('', '_blank');
                novaJanela.document.write(`
                    <div style="text-align:center; font-family:sans-serif; padding:20px;">
                        <h2>Seu PIX foi gerado!</h2>
                        <img src="data:image/jpeg;base64,${dados.imagemQrCode}" style="width:250px; height:250px; margin:20px 0;" /><br/>
                        <p><strong>Copia e Cola:</strong></p>
                        <textarea style="width:100%; max-width:400px; height:80px; text-align:center; padding:5px;" readonly>${dados.copiaECola}</textarea>
                        <p style="color:green; font-size:14px; font-weight:bold; margin-top:15px;">Após pagar, o saldo entrará na sua conta.</p>
                    </div>
                `);
            } else {
                alert('Erro do Gateway: ' + (dados.error || 'Não foi possível gerar o Pix.'));
            }
        } catch (err) {
            alert('Erro ao conectar com o servidor de pagamentos.');
        }
    });
    </script>
    
</body>
</html>
