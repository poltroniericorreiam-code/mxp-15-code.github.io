<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MXP$15</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Estilos extras para barra deslizante e sistema de expansão */
    .categorias {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px 15px;
      white-space: nowrap;
      scrollbar-width: none;
    }
    .categorias::-webkit-scrollbar { display: none; }
    .categorias button {
      flex: 0 0 auto;
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      background: #1e1e2f;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
    .categorias button.active {
      background: #e6af2e;
      color: #000;
    }
    .search-box {
      padding: 0 15px;
      margin: 10px 0;
    }
    .search-box input {
      width: 100%;
      padding: 10px 15px;
      border-radius: 20px;
      border: 1px solid #333;
      background: #181824;
      color: #fff;
      font-size: 14px;
    }
    /* Grade fixada em 4 colunas (formato 4x4) com capas preenchendo tudo */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 0 10px;
    }
    .game-card {
      background: transparent;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      display: none;
      position: relative;
      cursor: pointer;
    }
    .game-card.visible {
      display: block;
    }
    .game-card img {
      width: 100%;
      height: 100%;
      border-radius: 10px;
      aspect-ratio: 1/1;
      object-fit: cover;
      display: block;
      transition: transform 0.2s;
    }
    .game-card:hover img {
      transform: scale(1.03);
    }
    .btn-mostrar-mais {
      display: block;
      width: 90%;
      margin: 15px auto;
      padding: 10px;
      background: #22223b;
      color: #e6af2e;
      border: 1px solid #e6af2e;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
    }
    .secao-provedor {
      margin-top: 25px;
      border-top: 1px solid #22223b;
      padding-top: 15px;
    }

    /* ESTILO DA BARRA DE GANHOS AO VIVO */
    .live-winner-bar {
      background: linear-gradient(90deg, #181824, #2a2a40, #181824);
      border-top: 1px solid #e6af2e33;
      border-bottom: 1px solid #e6af2e33;
      color: #fff;
      padding: 8px 15px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      white-space: nowrap;
      margin-bottom: 10px;
    }
    .live-winner-bar .badge {
      background: #e6af2e;
      color: #000;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      text-transform: uppercase;
    }
    .live-winner-text {
      display: inline-block;
    }
  </style>
</head>

  <script>
    let categoriaAtual = 'popular';
    let expandido = false;
    let expandidoPg = false;
    let expandidoTada = false;

    // SCRIPT DE NOTIFICAÇÕES AO VIVO
    const players = ["Carlos_99", "Ana_Silva", "Lucas_Bet", "MarianaX", "Gabriel_Sp", "Julio_Lima", "Fernanda_O", "Bruna_Fox", "Ramon_Rs", "Camila_M"];
    const acoesPremio = ["acabou de sacar R$", "ganhou R$", "lucrou R$", "resgatou R$"];
    const jogosLista = ["Fortune Tiger", "Fortune Rabbit", "Gates of Olympus", "Money Coming", "Fortune Gems", "Sweet Bonanza"];

    function gerarNoticiaAoVivo() {
      const player = players[Math.floor(Math.random() * players.length)];
      const acao = acoesPremio[Math.floor(Math.random() * acoesPremio.length)];
      const valor = (Math.random() * (450 - 25) + 25).toFixed(2).replace('.', ',');
      const jogo = jogosLista[Math.floor(Math.random() * jogosLista.length)];

      const tickerElement = document.getElementById('liveWinnerTicker');
      if (tickerElement) {
        tickerElement.innerText = `🎉 ${player} ${acao} ${valor} no ${jogo}!`;
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      gerarNoticiaAoVivo();
      setInterval(gerarNoticiaAoVivo, 3500);
      atualizarExibicaoJogos();
      atualizarSecoesFixas();

      // ALTERAÇÃO: Carrega e exibe o saldo salvo no navegador (como o da roleta)
      const saldoSalvo = localStorage.getItem('mxp_saldo') || '0.00';
      const saldoFormatado = parseFloat(saldoSalvo).toLocaleString('pt-BR', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
      const elementoSaldo = document.getElementById('saldoTotal');
      if (elementoSaldo) {
        elementoSaldo.innerText = `R$ ${saldoFormatado}`;
      }
    });

    function filtrarCategoria(cat, elemento) {
      categoriaAtual = cat;
      expandido = false;
      document.getElementById('btnExpandir').innerText = "Mostrar Tudo ▼";
      
      document.querySelectorAll('.categorias button').forEach(b => b.classList.remove('active'));
      elemento.classList.add('active');

      atualizarExibicaoJogos();
    }

    function atualizarExibicaoJogos() {
      const cards = document.querySelectorAll('#gridJogos .game-card');
      let visiveisContador = 0;

      cards.forEach(card => {
        const catCard = card.getAttribute('data-cat');
        if (catCard === categoriaAtual) {
          if (expandido || visiveisContador < 8) { 
            card.classList.add('visible');
            visiveisContador++;
          } else {
            card.classList.remove('visible');
          }
        } else {
          card.classList.remove('visible');
        }
      });

      const totalDaCategoria = Array.from(cards).filter(c => c.getAttribute('data-cat') === categoriaAtual).length;
      const btn = document.getElementById('btnExpandir');
      if (totalDaCategoria > 8) {
        btn.style.display = 'block';
      } else {
        btn.style.display = 'none';
      }
    }

    function alternarExpandir() {
      expandido = !expandido;
      const btn = document.getElementById('btnExpandir');
      if (expandido) {
        btn.innerText = "Recolher ▲";
      } else {
        btn.innerText = "Mostrar Tudo ▼";
      }
      atualizarExibicaoJogos();
    }

    function alternarExpandirSecao(secao) {
      if (secao === 'pg') {
        expandidoPg = !expandidoPg;
        const btn = document.getElementById('btnExpandirPg');
        btn.innerText = expandidoPg ? "Recolher ▲" : "Mostrar Tudo ▼";
        
        const cards = document.querySelectorAll('.pg-card');
        cards.forEach((card, index) => {
          if (expandidoPg || index < 8) {
            card.classList.add('visible');
          } else {
            card.classList.remove('visible');
          }
        });
      } else if (secao === 'tada') {
        expandidoTada = !expandidoTada;
        const btn = document.getElementById('btnExpandirTada');
        btn.innerText = expandidoTada ? "Recolher ▲" : "Mostrar Tudo ▼";
        
        const cards = document.querySelectorAll('.tada-card');
        cards.forEach((card, index) => {
          if (expandidoTada || index < 8) {
            card.classList.add('visible');
          } else {
            card.classList.remove('visible');
          }
        });
      }
    }

    function pesquisarJogos() {
      const termo = document.getElementById('inputBusca').value.toLowerCase();
      const cards = document.querySelectorAll('.game-card');
      
      if (termo === "") {
        atualizarExibicaoJogos();
        atualizarSecoesFixas();
        return;
      }

      cards.forEach(card => {
        const nomeJogo = card.getAttribute('data-nome');
        if (nomeJogo.includes(termo)) {
          card.classList.add('visible');
        } else {
          card.classList.remove('visible');
        }
      });
      document.getElementById('btnExpandir').style.display = 'none';
      document.getElementById('btnExpandirPg').style.display = 'none';
      document.getElementById('btnExpandirTada').style.display = 'none';
    }

    function atualizarSecoesFixas() {
      const cardsPg = document.querySelectorAll('.pg-card');
      cardsPg.forEach((card, index) => {
        if (expandidoPg || index < 8) card.classList.add('visible');
        else card.classList.remove('visible');
      });
      document.getElementById('btnExpandirPg').style.display = 'block';

      const cardsTada = document.querySelectorAll('.tada-card');
      cardsTada.forEach((card, index) => {

        else card.classList.remove('visi
