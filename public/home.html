<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MXP$15</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topo">
    <div class="logo">MXP$15</div>
    <div class="saldo">R$ 00,00</div>

  <section class="acoes">
    <button onclick="window.location.href='deposito.html'">Depósito</button>
    <button onclick="window.location.href='saque.html'">Saque</button>

      <div style="text-align: center; line-height: 1.2; margin-bottom: 10px;">
        <span style="font-size: 18px;">Bem-vindo ao</span><br>
        <span style="font-size: 24px; font-weight: bold;">MXP$15</span>
      </div>
      <button onclick="window.location.href='promocao.html'">VER PROMOÇÕES</button>
    </div>

  <section class="categorias">
    <button class="active" onclick="renderGames('popular')">🔥 Popular</button>
    <button onclick="renderGames('pg')">🐯 PG</button>
    <button onclick="renderGames('pragmatic')">🎰 Pragmatic</button>
    <button onclick="renderGames('evolution')">🎲 Evolution</button>
    <button onclick="renderGames('tada')">👈 Tada</button>

  <section class="games-section" id="game-container"></section>

  <nav class="menu-bottom">
    <a href="home.html" class="active">🏠 Início</a>
    <a href="promocao.html">🎁 Promoção</a>
    <a href="convite.html">👥 Convidar</a>
