<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Casino Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #0b0e14; --card-bg: #161b22; --accent-gold: #d4af37; --btn-green: #00c853; --text-main: #ffffff; --text-muted: #8b949e; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; padding-bottom: 90px; }

        /* Estilo da Navbar */
        .navbar { 
            position: fixed; bottom: 0; width: 100%; background: #0b0e14; 
            border-top: 1px solid #30363d; display: flex; justify-content: space-around; 
            padding: 12px 0; z-index: 1000;
        }
        .nav-item { color: var(--text-muted); font-size: 0.75em; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-item i { font-size: 1.4em; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--accent-gold); }

        /* Estilos dos cards (já definidos anteriormente) */
        .header-profile { padding: 25px 20px; display: flex; align-items: center; gap: 15px; background: linear-gradient(180deg, #1c2431 0%, #0b0e14 100%); }
        .avatar { width: 70px; height: 70px; border-radius: 15px; border: 2px solid var(--accent-gold); object-fit: cover; }
        .btn-container { display: flex; gap: 15px; padding: 0 20px; margin-top: -15px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .btn-saque { background: #262d3a; color: white; }
        .btn-deposito { background: var(--btn-green); color: #000; }
        .menu-list { margin: 20px; display: flex; flex-direction: column; gap: 12px; }
        .menu-item { background: var(--card-bg); padding: 18px; border-radius: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #30363d; }
    </style>
</head>
<body>

    <div class="header-profile">
        <img src="https://i.pravatar.cc/150?u=1" class="avatar" alt="Avatar">
        <div>
            <div style="font-size: 0.9em; color: var(--text-muted);">ID: 1000535545</div>
            <div style="font-size: 1.8em; font-weight: 700;">R$ 0,56</div>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn btn-saque">Saque</button>
        <button class="btn btn-deposito">Depósito</button>
    </div>

    <div class="menu-list">
        <div class="menu-item"><i class="fa-solid fa-file-invoice"></i> Relatórios</div>
        <div class="menu-item"><i class="fa-solid fa-user-plus"></i> Convidar</div>
    </div>

    <nav class="navbar">
        <div class="nav-item" onclick="location.href='index.html'">
            <i class="fa-solid fa-house"></i>Inicio
        </div>
        <div class="nav-item" onclick="location.href='promocao.html'">
            <i class="fa-solid fa-gift"></i>Promoção
        </div>
        <div class="nav-item" onclick="location.href='deposito.html'">
            <i class="fa-solid fa-wallet"></i>Depósito
        </div>
        <div class="nav-item" onclick="location.href='saque.html'">
            <i class="fa-solid fa-arrow-right-arrow-left"></i>Saque
        </div>
        <div class="nav-item active" onclick="location.href='perfil.html'">
            <i class="fa-solid fa-user"></i>Perfil
        </div>
    </nav>

</body>
</html>
