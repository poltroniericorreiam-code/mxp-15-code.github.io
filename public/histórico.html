<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Histórico</title>
    <style>
        body { background: #0b0e14; color: #fff; font-family: sans-serif; padding: 20px; }
        .item { background: #161b22; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent-gold); }
        .valor { font-weight: bold; color: #00c853; }
    </style>
</head>
<body>
    <h2>Histórico de Atividades</h2>
    
    <div class="item">
        <div>Aposta em Slots (PG)</div>
        <div class="valor">- R$ 500,00</div>
    </div>
    
    <div class="item">
        <div>Rebate Coletado</div>
        <div class="valor">+ R$ 15,00</div>
    </div>
    
    <div class="item">
        <div>Saque Realizado</div>
        <div class="valor">- R$ 100,00</div>
    </div>

    <button onclick="history.back()">Voltar</button>
</body>
</html>
