<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções</title>
    <!-- Substitua pelo caminho correto do seu arquivo CSS se necessário -->
    <link rel="stylesheet" href="estilos.css">
    <style>
        body { font-family: sans-serif; background-color: #050505; color: white; margin: 0; padding: 20px; }
        .login-box { max-width: 400px; margin: auto; background-color: #1a1a1a; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="login-box">
        <!-- Título -->
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: #ffffff; margin: 0;">Promoções MXP$15</h2>
        </div>

        <!-- Grade de Baús -->
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px;">

            <!-- Baú 1 -->
            <div style="position: relative; text-align: center;">
                <img src="treasureBoxClose.png" style="width: 100%; height: auto; object-fit: contain;">
                <div style="position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 8px; font-weight: bold; width: 100%; pointer-events: none;">
                    Promo 1<br><span style="color: #f6ad55;">R$ 30</span>
                </div>
            </div>

            <!-- Baú 2 -->
            <div style="position: relative; text-align: center;">
                <img src="treasureBoxClose.png" style="width: 100%; height: auto; object-fit: contain;">
                <div style="position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 8px; font-weight: bold; width: 100%; pointer-events: none;">
                    Promo 2<br><span style="color: #f6ad55;">R$ 30</span>
                </div>
            </div>

            <!-- Baú 3 -->
            <div style="position: relative; text-align: center;">
                <img src="treasureBoxClose.png" style="width: 100%; height: auto; object-fit: contain;">
                <div style="position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 8px; font-weight: bold; width: 100%; pointer-events: none;">
                    Promo 3<br><span style="color: #f6ad55;">R$ 30</span>
                </div>
            </div>

            <!-- Baú 4 -->
            <div style="position: relative; text-align: center;">
                <img src="treasureBoxClose.png" style="width: 100%; height: auto; object-fit: contain;">
                <div style="position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 8px; font-weight: bold; width: 100%; pointer-events: none;">
                    Promo 4<br><span style="color: #f6ad55;">R$ 30</span>
                </div>
            </div>
        </div>

        <!-- Botão Voltar -->
        <div style="text-align: center;">
            <button onclick="window.location.href='index.html'" style="padding: 12px 40px; background-color: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                Voltar
            </button>
        </div>
    </div>

</body>
</html>
