<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções</title>
    <style>
        body {
            background-color: #0b1e33;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .header-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .vip-btn {
            background-color: #007bff;
        }

        .code-btn {
            background-color: #007bff;
        }

        .banner-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .banner {
            width: 320px; /* Largura solicitada */
            max-width: 100%; /* Garante que não ultrapasse a tela em celulares menores */
            height: auto;
            border-radius: 10px; /* Bordas arredondadas */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); /* Sombra para destacar */
        }

        .promo-text {
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 400px;
        }

        .invite-btn {
            background-color: #1a2a3a;
            color: white;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1em;
            cursor: pointer;
        }

        .back-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
    <button class="btn">Evento</button>
    <button class="btn">Rebate</button>
    <button class="btn">Código</button>
    <button class="btn">VIP</button>
    <button class="btn">Histórico</button>
    <button class="btn">pendente<button>
    </div>

    <div class="banner-container">
        <img src="IMG-20260707-WA0001.jpg" class="banner" alt="Promoções">
    </div>

    <p class="promo-text">Convide amigos e ganhe bônus.</p>

    <div class="button-container">
        <button class="invite-btn">Convide 1 pessoas = 30</button>
        <button class="invite-btn">pendente</button>
        <button class="invite-btn">pendente</button>
        <button class="back-btn">Voltar</button>
    </div>

</body>
</html>
