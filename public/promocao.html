<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções - MXP$15</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- CABEÇALHO DE ABAS (Eventos, Rebate, etc) -->
    <header class="promo-header">
        <div class="tabs">
            <button>Eventos</button>
            <button class="active">Rebate</button>
            <button>VIP</button>
            <button>Código de Resgate</button>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL (Sidebar + Lista de Rebate) -->
    <div class="rebate-container">
        
        <!-- MENU LATERAL -->
        <aside class="rebate-sidebar">
            <button class="nav-item">Cartas</button>
            <button class="nav-item">Slot</button>
            <button class="nav-item">Pesca</button>
            <button class="nav-item">Esportes</button>
            <button class="nav-item">Cassino</button>
            <button class="btn-receber">Receber</button>
            <button class="btn-historico">Histórico</button>
        </aside>

        <!-- LISTA DE REBATE (Com a imagem atualizada no banner de cima, se necessário) -->
        <main class="rebate-list">
            <div class="rebate-card">
                <div class="card-header">
                    <img src="logo-provider.png" alt="Provedor">
                    <div class="info">
                        <span>Aposta <b>0,00</b></span>
                        <span>Taxa de reembolso <b>0,00%</b></span>
                    </div>
                </div>
                <div class="card-footer">
                    <p>Aposte 1,00 para receber 0,50%</p>
                    <span>Coletável <b>0,00</b></span>
                </div>
                <!-- Linha do ID adicionada conforme solicitado -->
                <div style="margin-top: 10px; font-size: 11px; color: #8892b0; border-top: 1px solid #23283c; padding-top: 5px; text-align: right;">
                    ID: <b>1</b>
                </div>
            </div>
        </main>
    </div>

    <!-- MENU INFERIOR -->
    <nav class="menu-bottom">
        <a href="home.html">🏠 <span>Início</span></a>
        <a href="promocao.html" class="active">🎁 <span>Promoção</span></a>
        <a href="convite.html">👥 <span>Convidar</span></a>
        <a href="perfil.html">👤 <span>Perfil</span></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
