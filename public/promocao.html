<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoções 8143</title>
    <style>
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: #0a1424; color: white; }
        
        .container { padding: 15px; padding-bottom: 90px; }
        
        /* Estilo dos Cards */
        .promo-card {
            background: linear-gradient(135deg, #0044cc, #002266);
            border: 1px solid #3366ff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .promo-text h2 { margin: 0; color: #ffcc00; font-size: 1.2rem; }
        .promo-text p { margin: 5px 0 0 0; font-size: 0.8rem; font-weight: bold; }
        .promo-img { width: 80px; height: 80px; background: rgba(0,0,0,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #6688aa; }

        /* Barra Inferior Funcional */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0d1b33;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #1a3a66;
            cursor: pointer;
        }
        .nav-item { font-size: 0.75rem; color: #8899aa; text-align: center; transition: 0.3s; }
        .nav-item.active { color: #ffffff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="promo-card">
            <div class="promo-text">
                <h2>R$ 2777</h2>
                <p>RECOMPENSA DE RECARGA</p>
            </div>
            <div class="promo-img">Imagem</div>
        </div>
        </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="navegar('inicio.html')">Início</div>
        <div class="nav-item" onclick="navegar('promocao.html')">Promoção</div>
        <div class="nav-item" onclick="navegar('deposito.html')">Depósito</div>
        <div class="nav-item" onclick="navegar('saque.html')">Saque</div>
        <div class="nav-item" onclick="navegar('perfil.html')">Perfil</div>
    </div>

    <script>
        function navegar(url) {
            // Aqui você pode redirecionar o usuário
            console.log("Indo para: " + url);
            // window.location.href = url; // Descomente esta linha para ativar a navegação real
            
            // Lógica simples para mudar a cor do botão ativo
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
