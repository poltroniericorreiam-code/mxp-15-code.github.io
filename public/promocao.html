<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promoções</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Bloqueia o balanço da página para os lados no celular */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .login-box {
            max-width: 100%;
            overflow-x: hidden;
            box-sizing: border-box;
            font-family: sans-serif;
            text-align: center;
            color: #ffffff;
        }

        /* CONTAINER PRINCIPAL DA BARRA (Com trava horizontal) */
        .scroll-menu-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            background-color: transparent;
            margin-bottom: 20px;
            padding: 12px 0;
            position: relative;
            z-index: 999;
            touch-action: pan-x; 
            -webkit-overflow-scrolling: touch;
        }

        /* Oculta completamente a barra visual de rolagem */
        .scroll-menu-container::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        /* LISTA INTERNA DOS BOTÕES */
        .scroll-menu-list {
            display: flex;
            gap: 10px;
            padding: 0 15px;
            width: max-content;
        }

        /* BOTÕES DO MENU SUPERIOR (Pretos com letras brancas) */
        .menu-tab-btn {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 10px 18px;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* BOTÃO ATIVO NO MENU SUPERIOR (Destaque para saber qual está selecionado) */
        .menu-tab-btn.active {
            background-color: #222222;
            border-color: #ffffff;
            color: #ffffff;
        }

        /* ESTILO DOS BOTÕES GRANDES DE CONVITE (Preto com letras brancas) */
        .login-box button:not(.menu-tab-btn) {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #333333;
            border-radius: 8px;
            width: 90%;
            max-width: 340px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: background-color 0.2s;
        }

        .login-box button:not(.menu-tab-btn):active {
            background-color: #222222;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <!-- BARRA SUPERIOR (Botões pretos com letras brancas) -->
        <div class="scroll-menu-container">
            <div class="scroll-menu-list">
                <button class="menu-tab-btn active">Eventos</button>
                <button class="menu-tab-btn" onclick="window.location.href='rebate.html'">Rebate</button>
                <button class="menu-tab-btn">VIP</button>
                <button class="menu-tab-btn">Código de Resgate</button>
                <button class="menu-tab-btn">Histórico</button>
                <button class="menu-tab-btn">Pendente</button>
            </div>
        </div>

        <!-- Bloco do Topo da Promoção -->
        <div style="background-color: #1a1f2c; padding: 30px 20px; text-align: center; border-radius: 16px; margin-bottom: 20px;">
            
            <!-- Container Adaptável da Imagem -->
            <div style="margin-bottom: 20px; display: inline-block; width: 100%; max-width: 320px;">
                <img src="IMG-20260707-WA0001.jpg" alt="Promoção Pesca" style="width: 100%; max-width: 320px; height: auto; border-radius: 16px; display: block; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
            </div>

            <!-- Texto Puxado para Cima da Imagem -->
            <h2 style="color: #ffffff; font-size: 24px; font-weight: 700; margin: 0; margin-top: -65px; position: relative; z-index: 10; letter-spacing: 0.5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
                Promoções MXP$15
            </h2>

        </div>

        <!-- Seção de Convites e Botões Inferiores -->
        <p style="margin-bottom: 20px; font-size: 16px;">Convide amigos e ganhe bônus.</p>

        <button onclick="window.location.href='convite.html'">
            Convide 1 pessoa = R$30
        <button>
       
        <br>

        <button>
            falta 222222
        <button>

        <br>
            
        <button>
            falta111111
        </button>

        <br>

        <button onclick="window.location.href='index.html'">
            Voltar
        </button>

    </div>

</body>

</html>
