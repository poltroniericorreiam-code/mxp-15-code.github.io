<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promoções</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* CONTAINER PRINCIPAL DA BARRA (Trava o arrasto da página) */
        .scroll-menu-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            background-color: transparent;
            border-radius: 8px;
            margin-bottom: 20px;
            padding: 12px 0;
            position: relative;
            z-index: 999;
            /* Força o navegador do celular a rolar apenas de lado e ignorar a página */
            touch-action: pan-x; 
            -webkit-overflow-scrolling: touch;
        }

        /* Oculta completamente qualquer barra visual */
        .scroll-menu-container::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        /* LISTA INTERNA DOS BOTÕES */
        .scroll-menu-list {
            display: flex;
            gap: 14px;
            padding: 0 15px;
            width: max-content;
        }

        /* BOTÕES DO MENU */
        .menu-tab-btn {
            color: #8fa0b4;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 600;
            background: none;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        /* BOTÃO ATIVO (EVENTOS) */
        .menu-tab-btn.active {
            color: #3b82f6;
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 3px;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <div class="scroll-menu-container">
            <div class="scroll-menu-list">
                <button class="menu-tab-btn active">Eventos</button>
                <button class="menu-tab-btn">Rebate</button>
                <button class="menu-tab-btn">VIP</button>
                <button class="menu-tab-btn">Código de Resgate</button>
                <button class="menu-tab-btn">Histórico</button>
                <button class="menu-tab-btn">Pendente</button>
            </div>
        </div>

        <div style="background-color: #1a1f2c; padding: 30px 20px; text-align: center; border-radius: 16px; font-family: sans-serif; margin-bottom: 20px;">
            
            <div style="margin-bottom: 20px; display: inline-block;">
                <img src="IMG-20260707-WA0001.jpg" alt="Promoção Pesca" style="width: 320px; height: auto; border-radius: 16px; display: block; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
            </div>

            <h2 style="color: #ffffff; font-size: 24px; font-weight: 700; margin: 0; margin-top: -65px; position: relative; z-index: 10; letter-spacing: 0.5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
                Promoções MXP$15
            </h2>

        </div>

        <p>Convide amigos e ganhe bônus.</p>

        <br>

        <button onclick="window.location.href='convite.html'">
            Convide 1 pessoa = R$30
        </button>

        <br><br>

        <button>
            Convide 10 pessoas = R$300
        </button>

        <br><br>

        <button>
            Convide 100 pessoas = R$1000
        </button>

        <br><br>

        <button onclick="window.location.href='index.html'">
            Voltar
        </button>

    </div>

</body>

</html>
