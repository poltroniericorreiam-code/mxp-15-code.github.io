<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promoções - MXP$15</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Abas de navegação -->
  <div class="promo-tabs">
    <button>Eventos</button>
    <button class="active">Rebate</button>
    <button>VIP</button>
    <button>Código de Resgate</button>
    <button>Histórico</button>
  </div>

  <div class="promo-container">
    <div class="promo-card">
      <img src="public/IMG_20260708_172307.png" alt="Recompensa Recarga">
    </div>
    <div class="promo-card">
      <img src="IMG_20260708_172242.png" alt="Convide Amigo" class="banner">
    </div>
  </div>

  <!-- SEÇÃO DE REBATE -->
  <div class="rebate-container">
    <!-- Barra Lateral -->
    <aside class="rebate-sidebar">
        <button class="nav-item active">Cartas</button>
        <button class="nav-item">Slot</button>
        <button class="nav-item">Pesca</button>
        <button class="nav-item">Esportes</button>
        <button class="nav-item">Cassino</button>
        <button class="btn-receber">Receber</button>
        <button class="btn-historico">Histórico</button>
    </aside>

    <!-- Lista de Reembolso -->
    <main class="rebate-list">
        <!-- Card de Rebate -->
        <div class="rebate-card">
            <div class="card-header">
                <img src="logo-provider.png" alt="Logo" class="provider-logo">
                <div class="info">
                    <span>Aposta <b>0,00</b></span>
                    <span>Taxa de reembolso <b>0,00%</b></span>
                </div>
            </div>
            <div class="card-footer">
                <p>Aposte 1,00 para receber 0,50%</p>
                <span>Coletável <b>0,00</b></span>
            </div>
            <!-- LINHA ADICIONADA: ID do evento -->
            <div style="margin-top: 10px; text-align: right; font-size: 11px; color: #8892b0; border-top: 1px solid #23283c; padding-top: 5px;">
                ID: <b>1</b>
            </div>
        </div>
        <!-- Você pode copiar o bloco .rebate-card acima para listar mais provedores -->
    </main>
  </div>
  
  <!-- MENU INFERIOR -->
  <nav class="menu-bottom">
    <a href="home.html">🏠 <span>Início</span></a>
    <a href="promocao.html" class="active">🎁 <span>Promoção</span></a>
    <a href="convite.html">👥 <span>Convidar</span></a>
    <a href="perfil.html">👤 <span>Perfil</span></a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
